<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('construction.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 41, 59, 0.8) 100%);
            backdrop-filter: blur(4px);
            z-index: -1;
        }

        .content {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 2rem;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            max-width: 800px;
        }

        h1 span {
            color: #38bdf8;
            display: inline-block;
            margin-top: 0.5rem;
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.125rem);
            line-height: 1.6;
            margin-bottom: 1rem;
            max-width: 600px;
            color: #cbd5e1;
            font-weight: 400;
            padding: 0 1rem;
        }

        .note-card {
            margin-top: clamp(2rem, 5vw, 3rem);
            padding: clamp(1rem, 3vw, 1.5rem);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, background 0.3s ease;
            width: 90%;
            max-width: 500px;
        }

        .note-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .license-note {
            font-size: clamp(0.75rem, 2vw, 0.875rem);
            color: #94a3b8;
            margin-bottom: 0;
            font-style: italic;
        }

        .progress-bar {
            width: 90%;
            max-width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: clamp(1.5rem, 4vw, 2rem) auto;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 15%;
            background: #38bdf8;
            border-radius: 10px;
            box-shadow: 0 0 10px #38bdf8;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                opacity: 0.8;
                box-shadow: 0 0 8px #38bdf8;
            }

            50% {
                opacity: 1;
                box-shadow: 0 0 16px #38bdf8;
            }

            100% {
                opacity: 0.8;
                box-shadow: 0 0 8px #38bdf8;
            }
        }

        @media screen and (max-height: 500px) {
            .content {
                padding: 1rem;
                justify-content: flex-start;
                overflow-y: auto;
            }

            h1 {
                margin-top: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="background-container"></div>
    <div class="overlay"></div>

    <main class="content">
        <h1>Site is undergoing construction currently. <br><span>You can expect something soon.</span></h1>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <p>I'm developing it right now, I'm just laying out the foundations.</p>

        <div class="note-card">
            <p class="license-note">Note: Please stick to the license.</p>
        </div>
    </main>
</body>

</html>
